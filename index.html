
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#D8B8AE" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>UME Estética • Caixa Premium</title>
  <style>
    :root {
      --bg: #fdf9f6;
      --bg-2: #faf4ef;
      --card: rgba(255,255,255,.96);
      --ink: #2f2a28;
      --muted: #7b746e;
      --line: #ece4db;
      --rose: #d8b8ae;
      --rose-2: #e7c9bf;
      --rose-3: #bfa097;
      --sage: #cadbc7;
      --success: #5d8a68;
      --danger: #b46d6d;
      --shadow-1: 0 16px 34px rgba(0,0,0,.06);
      --shadow-2: 0 28px 60px rgba(0,0,0,.08);
      --radius-xl: 34px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --sidebar-w: 196px;
      --logo-desktop: 96px;
      --logo-mobile: 132px;
      --mobile-nav-h: 94px;
    }
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      transition: background-color .18s ease, color .18s ease, border-color .18s ease, box-shadow .18s ease, transform .18s ease, opacity .18s ease;
    }
    html, body { height: 100%; width: 100%; max-width: 100%; overflow-x: hidden; }
    body {
      margin: 0;
      font-family: "SF Pro Display", "SF Pro Text", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(216,184,174,.24), transparent 28%),
        radial-gradient(circle at top right, rgba(202,219,199,.30), transparent 24%),
        linear-gradient(180deg, #fffefd 0%, var(--bg) 40%);
      overflow: hidden;
      letter-spacing: -.01em;
    }
    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      height: 100vh;
      height: 100dvh;
      width: 100%;
      overflow: hidden;
    }

    /* Sidebar desktop */
    .sidebar {
      border-right: 1px solid rgba(236,228,219,.92);
      background: rgba(255,253,250,.94);
      backdrop-filter: blur(24px);
      padding: calc(18px + var(--safe-top)) 14px 16px calc(14px + var(--safe-left));
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .sidebar::-webkit-scrollbar { display: none; }
    .brand {
      display: grid;
      justify-items: center;
      gap: 10px;
      padding: 18px 12px;
      border-radius: var(--radius-xl);
      border: 1px solid rgba(236,228,219,.95);
      background:
        radial-gradient(circle at top right, rgba(239,225,220,.66), transparent 44%),
        radial-gradient(circle at bottom left, rgba(235,242,233,.74), transparent 38%),
        linear-gradient(180deg, rgba(255,255,255,.99), rgba(252,248,244,.96));
      box-shadow: var(--shadow-1);
    }
    .logo-wrap {
      width: var(--logo-desktop);
      height: var(--logo-desktop);
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--rose), var(--rose-3));
      box-shadow: 0 20px 34px rgba(137,104,93,.18);
      flex: 0 0 auto;
    }
    .mobile-hero .logo-wrap {
      width: var(--logo-mobile);
      height: var(--logo-mobile);
      border-radius: 34px;
      box-shadow: 0 22px 36px rgba(137,104,93,.19);
    }
    .logo-img { width: 100%; height: 100%; object-fit: cover; display: block; background: #fff; }
    .logo-fallback { position: absolute; inset: 0; display: none; place-items: center; color: #fff; font-size: 26px; font-weight: 900; letter-spacing: .08em; }
    .logo-wrap.fallback .logo-img { display: none; }
    .logo-wrap.fallback .logo-fallback { display: grid; }
    .brand-mark { font-size: 16px; line-height: 1.05; font-weight: 900; text-align: center; letter-spacing: -.02em; }
    .brand-sub { font-size: 11px; color: var(--muted); font-weight: 700; text-align: center; }

    .nav, .sidebar-tools { display: grid; gap: 10px; }
    .nav-btn, .tool-btn {
      width: 100%;
      display: grid;
      justify-items: center;
      gap: 6px;
      padding: 11px 8px;
      border-radius: 24px;
      border: 1px solid rgba(216,184,174,.18);
      background: rgba(255,255,255,.60);
      color: var(--muted);
      cursor: pointer;
    }
    .nav-btn:hover, .tool-btn:hover { background: linear-gradient(135deg, rgba(239,225,220,.50), rgba(235,242,233,.56)); color: var(--ink); border-color: rgba(216,184,174,.30); transform: translateY(-1px); box-shadow: 0 10px 18px rgba(0,0,0,.04); }
    .nav-btn.active { background: linear-gradient(135deg, rgba(239,225,220,.86), rgba(235,242,233,.94)); color: var(--ink); border-color: rgba(216,184,174,.34); box-shadow: inset 0 0 0 1px rgba(255,255,255,.52), 0 10px 18px rgba(0,0,0,.04); }
    .tool-btn.danger { color: #8e5252; border-color: rgba(180,109,109,.24); }
    .tool-btn.danger:hover { background: linear-gradient(135deg, rgba(255,241,240,.99), rgba(251,243,242,.98)); }
    .nav-label, .tool-label { font-size: 11px; font-weight: 800; text-align: center; line-height: 1.08; }
    .nav-icon, .tool-icon {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.99);
      border: 1px solid rgba(236,228,219,.98);
      box-shadow: 0 6px 12px rgba(60,50,44,.03);
    }
    .nav-icon svg, .tool-icon svg, .mobile-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.55; stroke-linecap: round; stroke-linejoin: round; }

    /* Main */
    .main {
      min-width: 0;
      overflow: auto;
      padding: calc(18px + var(--safe-top)) calc(24px + var(--safe-right)) calc(18px + var(--safe-bottom)) 24px;
      -webkit-overflow-scrolling: touch;
    }
    .topbar { display: grid; justify-items: center; text-align: center; margin-bottom: 14px; }
    .title { margin: 0; font-size: 30px; line-height: 1; font-weight: 900; letter-spacing: -.06em; }
    .page { display: none; opacity: 0; transform: translateY(8px) scale(.995); }
    .page.active { display: block; animation: pageIn .22s cubic-bezier(.22,.8,.2,1) both; }
    @keyframes pageIn { from { opacity: 0; transform: translateY(10px) scale(.995); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .grid { display: grid; gap: 14px; }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .card {
      min-width: 0;
      padding: 18px;
      border-radius: var(--radius-xl);
      border: 1px solid rgba(236,228,219,.95);
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow-2);
    }
    .wallet-card {
      background:
        radial-gradient(circle at top right, rgba(239,225,220,.56), transparent 42%),
        radial-gradient(circle at bottom left, rgba(235,242,233,.70), transparent 36%),
        linear-gradient(160deg, rgba(255,255,255,.98), rgba(251,247,242,.97));
    }
    .card h3 { margin: 0 0 6px; font-size: 18px; line-height: 1.08; letter-spacing: -.03em; }
    .hero-card { min-height: 184px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 8px; }
    .hero-label { color: var(--muted); font-size: 13px; font-weight: 700; }
    .hero-value { font-size: 48px; line-height: .92; font-weight: 900; letter-spacing: -.08em; }
    .hero-value.positive { color: var(--success); }
    .hero-value.negative { color: var(--danger); }
    .hero-value.neutral { color: var(--ink); }
    .mini-card { min-height: 100px; display: flex; flex-direction: column; justify-content: center; gap: 5px; }
    .mini-label { color: var(--muted); font-size: 12px; font-weight: 700; }
    .mini-value { font-size: 28px; font-weight: 900; letter-spacing: -.05em; }
    .mini-value.positive { color: var(--success); }
    .mini-value.negative { color: var(--danger); }
    .compact-list { display: grid; gap: 10px; }
    .compact-item {
      display: flex; justify-content: space-between; gap: 10px; align-items: flex-start;
      padding: 12px; border-radius: 20px; border: 1px solid rgba(236,228,219,.95);
      background: linear-gradient(180deg, rgba(255,255,255,.99), rgba(251,247,242,.96));
      min-width: 0;
    }
    .compact-item strong { font-size: 14px; }
    .meta { margin-top: 4px; font-size: 12px; color: var(--muted); }

    label { display: block; margin-bottom: 6px; font-size: 12px; font-weight: 800; letter-spacing: .01em; color: #544d47; }
    .row { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin-bottom: 10px; }
    input, select, button { font: inherit; }
    input, select {
      width: 100%;
      min-height: 50px;
      padding: 12px 13px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.99);
      color: var(--ink);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    input:focus, select:focus { border-color: rgba(215,184,174,.95); box-shadow: 0 0 0 4px rgba(215,184,174,.14); }
    button {
      min-height: 50px;
      padding: 12px 16px;
      border-radius: 18px;
      border: none;
      font-weight: 800;
      cursor: pointer;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .btn-primary { background: linear-gradient(135deg, var(--rose-3), var(--rose-2)); color: #fff; box-shadow: 0 12px 24px rgba(143,126,116,.18); }
    .btn-secondary { background: #f4efe8; color: var(--ink); border: 1px solid var(--line); }
    .btn-danger { background: #fff1ee; color: #9d5757; border: 1px solid #efd9d3; }
    .btn-success { background: #eef7ef; color: #446f50; border: 1px solid #d2e4d6; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: end; margin-bottom: 12px; }
    .toolbar > div { min-width: 160px; flex: 1; }

    .table-wrap {
      width: 100%;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #fff;
      -webkit-overflow-scrolling: touch;
    }
    table { width: 100%; border-collapse: collapse; min-width: 1040px; background: #fff; }
    th, td { padding: 12px 13px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; font-size: 13px; }
    th { background: #fbf6f0; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; position: sticky; top: 0; z-index: 1; }
    tbody tr:hover { background: #fdfaf6; }

    .pill { display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; padding: 6px 10px; font-size: 11px; font-weight: 900; white-space: nowrap; }
    .pill.success { background: #e2f1e4; color: #426d4f; }
    .pill.danger { background: #fae7e5; color: #995252; }
    .pill.info { background: #f3ece7; color: #7a675b; }
    .pill.warn { background: #fff1da; color: #a77631; }
    .small { font-size: 12px; }
    .muted { color: var(--muted); }
    .right { text-align: right; }
    .summary { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .summary .item { padding: 10px 12px; border-radius: 16px; border: 1px dashed var(--line); background: rgba(255,255,255,.84); font-weight: 800; font-size: 13px; }
    .empty { border: 1px dashed var(--line); border-radius: 22px; padding: 24px; text-align: center; color: var(--muted); background: linear-gradient(180deg,#fff,#faf7f2); }

    /* Mobile cards */
    .mobile-stacked-list { display: none; }
    .mobile-list { display: grid; gap: 10px; }
    .mobile-item {
      padding: 12px;
      border-radius: 20px;
      border: 1px solid rgba(236,228,219,.95);
      background: linear-gradient(180deg, rgba(255,255,255,.99), rgba(251,247,242,.97));
      box-shadow: var(--shadow-1);
      min-width: 0;
    }
    .mobile-item-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .mobile-item-title { font-size: 14px; font-weight: 900; }
    .mobile-item-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .mobile-item-block {
      min-width: 0;
      padding: 8px 10px;
      border-radius: 14px;
      background: rgba(255,255,255,.76);
      border: 1px solid rgba(236,228,219,.92);
    }
    .mobile-item-label { display: block; font-size: 10px; font-weight: 800; color: var(--muted); margin-bottom: 2px; text-transform: uppercase; letter-spacing: .04em; }
    .mobile-item-value { font-size: 13px; font-weight: 700; word-break: break-word; }
    .mobile-item-actions { margin-top: 10px; display: flex; gap: 8px; }
    .mobile-item-actions .btn-danger { width: 100%; }

    /* Mobile layout */
    @media (max-width: 1100px) {
      .grid-2, .row { grid-template-columns: 1fr; }
    }
    @media (max-width: 920px) {
      html, body, .app { width: 100%; max-width: 100%; overflow-x: hidden !important; }
      body { overflow: auto; }
      .app { grid-template-columns: 1fr; height: auto; min-height: 100vh; min-height: 100dvh; }
      .sidebar { display: none; }
      .main {
        padding: calc(10px + var(--safe-top)) 12px calc(var(--mobile-nav-h) + 42px + var(--safe-bottom)) 12px;
        overflow-x: hidden;
        overflow-y: visible;
      }
      .mobile-hero {
        display: grid;
        justify-items: center;
        gap: 10px;
        padding: 18px 14px 14px;
        border: 1px solid rgba(236,228,219,.95);
        border-radius: 34px;
        background:
          radial-gradient(circle at top right, rgba(239,225,220,.66), transparent 44%),
          radial-gradient(circle at bottom left, rgba(235,242,233,.72), transparent 38%),
          linear-gradient(180deg, rgba(255,255,255,.99), rgba(252,248,244,.95));
        box-shadow: var(--shadow-1);
      }
      .mobile-hero .brand-mark { font-size: 18px; }
      .mobile-hero .brand-sub { font-size: 12px; }

      .mobile-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0,1fr));
        gap: 10px;
        margin: 14px 0 8px;
      }
      .mobile-action-btn {
        min-height: 88px;
        border-radius: 22px;
        display: grid;
        justify-items: center;
        gap: 6px;
      }
      .title { font-size: 24px; }
      .card {
        width: 100%;
        max-width: 100%;
        padding: 16px;
        border-radius: 28px;
        overflow: hidden;
      }
      .hero-value { font-size: 36px; }
      .mini-value { font-size: 24px; }
      .row { grid-template-columns: 1fr; }
      input, select, button { font-size: 16px !important; }
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .actions button { width: 100%; min-height: 52px; }
      .toolbar {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .toolbar > div { min-width: 0; width: 100%; }
      .table-wrap { display: none; }
      .mobile-stacked-list { display: block; }
      .mobile-item-grid { grid-template-columns: 1fr; }
      .summary { display: grid; grid-template-columns: 1fr 1fr; }
      .compact-item { flex-direction: column; align-items: flex-start; }

      .mobile-tabs {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: calc(10px + var(--safe-bottom));
        z-index: 30;
        background: rgba(255,253,250,.97);
        backdrop-filter: blur(18px);
        border: 1px solid var(--line);
        border-radius: 30px;
        padding: 8px;
        box-shadow: 0 18px 34px rgba(70,58,50,.12);
      }
      .mobile-btn {
        border: none;
        background: transparent;
        border-radius: 18px;
        padding: 10px 4px;
        min-height: 68px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        cursor: pointer;
        gap: 4px;
      }
      .mobile-btn.active {
        background: linear-gradient(135deg, rgba(239,225,220,.9), rgba(232,240,230,.9));
        color: var(--ink);
      }
      .mobile-btn .label { display: block; font-size: 10px; font-weight: 800; line-height: 1.05; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo-wrap" id="brandLogoWrap">
          <img src="ume-logo.jpg" alt="Logotipo UME" class="logo-img" id="brandLogoImg" />
          <div class="logo-fallback">UME</div>
        </div>
        <div class="brand-mark">UME Estética</div>
        <div class="brand-sub">Controle de caixa premium</div>
      </div>
      <nav class="nav" id="sidebarMenu"></nav>
      <div class="sidebar-tools">
        <button type="button" class="tool-btn" id="backupBtn"><span class="tool-icon"><svg viewBox="0 0 24 24"><path d="M12 16V5"/><path d="m7.5 9.5 4.5-4.5 4.5 4.5"/><path d="M5 15.5V18a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2.5"/></svg></span><span class="tool-label">Backup</span></button>
        <button type="button" class="tool-btn" id="restoreBtn"><span class="tool-icon"><svg viewBox="0 0 24 24"><path d="M12 8v11"/><path d="m16.5 13.5-4.5 4.5-4.5-4.5"/><path d="M5 8.5V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v2.5"/></svg></span><span class="tool-label">Restaurar</span></button>
        <button type="button" class="tool-btn" id="exportDataBtn"><span class="tool-icon"><svg viewBox="0 0 24 24"><path d="M4 19.5h16"/><path d="M7.5 15.5V9"/><path d="M12 15.5V5"/><path d="M16.5 15.5v-7"/></svg></span><span class="tool-label">Exportar</span></button>
        <button type="button" class="tool-btn danger" id="clearDataBtn"><span class="tool-icon"><svg viewBox="0 0 24 24"><path d="M4.5 7h15"/><path d="M9.5 3.5h5"/><path d="M8 7l.8 11a2 2 0 0 0 2 1.8h2.4a2 2 0 0 0 2-1.8L16 7"/></svg></span><span class="tool-label">Limpar</span></button>
      </div>
    </aside>

    <main class="main">
      <div class="mobile-hero">
        <div class="logo-wrap" id="mobileBrandLogoWrap">
          <img src="ume-logo.jpg" alt="Logotipo UME" class="logo-img" id="mobileBrandLogoImg" />
          <div class="logo-fallback">UME</div>
        </div>
        <div class="brand-mark">UME Estética</div>
        <div class="brand-sub">Controle de caixa premium</div>
      </div>

      <div class="mobile-actions">
        <button type="button" class="tool-btn mobile-action-btn" id="mobileBackupAction"><span class="tool-icon"><svg viewBox="0 0 24 24"><path d="M12 16V5"/><path d="m7.5 9.5 4.5-4.5 4.5 4.5"/><path d="M5 15.5V18a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2.5"/></svg></span><span class="tool-label">Backup</span></button>
        <button type="button" class="tool-btn mobile-action-btn" id="mobileRestoreAction"><span class="tool-icon"><svg viewBox="0 0 24 24"><path d="M12 8v11"/><path d="m16.5 13.5-4.5 4.5-4.5-4.5"/><path d="M5 8.5V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v2.5"/></svg></span><span class="tool-label">Restaurar</span></button>
        <button type="button" class="tool-btn mobile-action-btn" id="mobileExportAction"><span class="tool-icon"><svg viewBox="0 0 24 24"><path d="M4 19.5h16"/><path d="M7.5 15.5V9"/><path d="M12 15.5V5"/><path d="M16.5 15.5v-7"/></svg></span><span class="tool-label">Exportar</span></button>
        <button type="button" class="tool-btn mobile-action-btn danger" id="mobileClearAction"><span class="tool-icon"><svg viewBox="0 0 24 24"><path d="M4.5 7h15"/><path d="M9.5 3.5h5"/><path d="M8 7l.8 11a2 2 0 0 0 2 1.8h2.4a2 2 0 0 0 2-1.8L16 7"/></svg></span><span class="tool-label">Limpar</span></button>
      </div>

      <div class="topbar"><h2 class="title" id="pageTitle">Página Principal</h2></div>
      <section id="dashboard" class="page active"></section>
      <section id="receipts" class="page"></section>
      <section id="expenses" class="page"></section>
      <section id="reports" class="page"></section>
    </main>
  </div>

  <input type="file" id="restoreFileInput" accept="application/json,.json" style="display:none;" />
  <div class="mobile-tabs" id="mobileMenu"></div>

  <script>

function icon(name) {
  const icons = {
    home: `<svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V20h13V10.5"/></svg>`,
    income: `<svg viewBox="0 0 24 24"><path d="M12 19V5"/><path d="m6.5 10.5 5.5-5.5 5.5 5.5"/></svg>`,
    expense: `<svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="m17.5 13.5-5.5 5.5-5.5-5.5"/></svg>`,
    report: `<svg viewBox="0 0 24 24"><path d="M5 19V9"/><path d="M12 19V5"/><path d="M19 19v-8"/></svg>`
  };
  return icons[name] || icons.home;
}

const STORAGE_KEY = 'clinica-estetica-caixa-premium-final-ios';
const LEGACY_KEYS = [
  'clinica-estetica-caixa-premium-final-ios',
  'clinica-estetica-caixa-premium-v12-menu-ios',
  'clinica-estetica-caixa-premium-v12-savefix',
  'clinica-estetica-caixa-premium-v12-identidade',
  'clinica-estetica-caixa-premium-v11-produtividade-corrigida',
  'clinica-estetica-caixa-premium-v11-produtividade',

const state = {
  tabs: [
    { key: 'dashboard', label: 'Página Principal', icon: 'home' },
    { key: 'receipts', label: 'Entradas', icon: 'income' },
    { key: 'expenses', label: 'Saídas', icon: 'expense' },

  ],

  filters: { receiptsSearch: '', expensesSearch: '' },
  reportFilters: { startDate: '', endDate: '', kind: 'all', paymentMethod: 'all', search: '' }
};

const uid = () => `${Date.now()}-${Math.random().toString(16).slice(2)}`;
function todayISO() { const d = new Date(); const tz = d.getTimezoneOffset() * 60000; return new Date(d - tz).toISOString().slice(0, 10); }
function formatCurrency(v) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v || 0)); }
function formatDateBR(dateStr) { if (!dateStr) return '-'; const p = dateStr.slice(0,10).split('-'); return `${p[2]}/${p[1]}/${p[0]}`; }
function toCents(value) { return Math.round((Number(value || 0)) * 100); }
function centsToNumber(cents) { return Number((cents / 100).toFixed(2)); }
function normalize(text) { return String(text || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }
function matchesSearch(texts, query) { const q = normalize(query); if (!q) return true; return texts.some(t => normalize(t).includes(q)); }
function capitalizePayment(pm) { const map = { dinheiro:'Dinheiro', pix:'Pix', debito:'Débito', credito:'Crédito' }; return map[pm] || pm; }
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ transactions: state.transactions, filters: state.filters, reportFilters: state.reportFilters })); }

function distributeInstallments(totalAmount, installments) {
  const totalCents = toCents(totalAmount);
  const base = Math.floor(totalCents / installments);
  const remainder = totalCents % installments;
  const values = [];
  for (let i = 0; i < installments; i++) values.push(base + (i < remainder ? 1 : 0));
  return values.map(centsToNumber);
}
function calculateInstallmentDate(baseDate, index, startNextMonth = false) {
  const [y,m,d] = baseDate.slice(0,10).split('-').map(Number);
  const target = new Date(y, (m - 1) + (startNextMonth ? 1 : 0) + index, Math.min(d, 28));
  return target.toISOString().slice(0,10);
}
function generateSchedule(tx) {
  const installments = Number(tx.installments || 1);
  if (tx.paymentMethod === 'credito' && tx.creditOption === 'parcelado' && installments > 1) {
    return distributeInstallments(tx.amount, installments).map((value, idx) => {
      const effectiveDate = calculateInstallmentDate(tx.date, idx, true);
      return { transactionId: tx.id, kind: tx.kind, sourceDate: tx.date, effectiveDate, monthKey: effectiveDate.slice(0,7), installmentNumber: idx + 1, installmentsTotal: installments, amount: value, patient: tx.patient || '', procedure: tx.procedure || '', description: tx.description || '', paymentMethod: tx.paymentMethod, creditInfo: `${idx + 1}/${installments}` };
    });
  }
  return [{ transactionId: tx.id, kind: tx.kind, sourceDate: tx.date, effectiveDate: tx.date, monthKey: tx.date.slice(0,7), installmentNumber: 1, installmentsTotal: 1, amount: Number(tx.amount), patient: tx.patient || '', procedure: tx.procedure || '', description: tx.description || '', paymentMethod: tx.paymentMethod, creditInfo: 'À vista' }];
}
function getAllSchedule() { return state.transactions.flatMap(generateSchedule).sort((a,b) => a.effectiveDate.localeCompare(b.effectiveDate)); }
function getDateRangeDefaults() { const t = new Date(); return { startDate: new Date(t.getFullYear(), t.getMonth(), 1).toISOString().slice(0,10), endDate: new Date(t.getFullYear(), t.getMonth() + 1, 0).toISOString().slice(0,10) }; }
function getMonthlySummary(referenceDate = todayISO()) { const month = referenceDate.slice(0,7); const items = getAllSchedule().filter(item => item.monthKey === month); const entries = items.filter(i => i.kind === 'receipt').reduce((s,i) => s + i.amount, 0); const exits = items.filter(i => i.kind === 'expense').reduce((s,i) => s + i.amount, 0); return { items, entries, exits, balance: entries - exits }; }

function load() {
  try {
    let data = null;
    for (const key of LEGACY_KEYS) { const raw = localStorage.getItem(key); if (raw) { data = JSON.parse(raw); break; } }
    if (data) {
      if (Array.isArray(data.transactions)) state.transactions = data.transactions;
      if (data.filters) state.filters = { ...state.filters, ...data.filters };
      if (data.reportFilters) state.reportFilters = { ...state.reportFilters, ...data.reportFilters };
    }
  } catch (e) { console.error('Erro ao carregar dados', e); }
  const defaults = getDateRangeDefaults();
  state.reportFilters.startDate = state.reportFilters.startDate || defaults.startDate;
  state.reportFilters.endDate = state.reportFilters.endDate || defaults.endDate;
}

function createBackupPayload() { return { app: 'UME Estética • Caixa', version: 'FINAL', exportedAt: new Date().toISOString(), data: { transactions: state.transactions, filters: state.filters, reportFilters: state.reportFilters } }; }
function downloadBackup() {
  const blob = new Blob([JSON.stringify(createBackupPayload(), null, 2)], { type: 'application/json;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `ume-estetica-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
}

    lines.push([item.effectiveDate, item.kind==='receipt' ? 'entrada' : 'saida', `"${String(item.patient || '').replaceAll('"','""')}"`, `"${String(principal).replaceAll('"','""')}"`, `"${String(comentarios).replaceAll('"','""')}"`, capitalizePayment(item.paymentMethod), item.paymentMethod==='credito' ? item.creditInfo : 'À vista', String(item.amount).replace('.', ',')].join(';'));
  });
  const blob = new Blob(["\ufeff" + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });

function clearAllData() {
  if (!confirm('Deseja realmente limpar todos os dados salvos neste navegador? Esta ação não pode ser desfeita.')) return;
  if (!confirm('Confirma novamente a exclusão total dos lançamentos, filtros e relatórios salvos?')) return;
  state.transactions = [];
  state.filters = { receiptsSearch: '', expensesSearch: '' };
  const defaults = getDateRangeDefaults();
  state.reportFilters = { startDate: defaults.startDate, endDate: defaults.endDate, kind: 'all', paymentMethod: 'all', search: '' };
  save(); renderSections(); alert('Dados locais removidos com sucesso.');
}
function restoreBackupFromFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const backup = JSON.parse(reader.result);
      const data = backup.data || backup;
      if (!Array.isArray(data.transactions)) throw new Error('Backup inválido');
      state.transactions = data.transactions;
      state.filters = { receiptsSearch: '', expensesSearch: '', ...(data.filters || {}) };
      const defaults = getDateRangeDefaults();
      state.reportFilters = { startDate: defaults.startDate, endDate: defaults.endDate, kind: 'all', paymentMethod: 'all', search: '', ...(data.reportFilters || {}) };
      save(); renderSections(); alert('Backup restaurado com sucesso!');
    } catch (err) { console.error(err); alert('Não foi possível restaurar o backup. Verifique se o arquivo JSON é válido.'); }
  };
  reader.readAsText(file, 'utf-8');
}

function bindLogoFallback() {
  [['brandLogoImg','brandLogoWrap'], ['mobileBrandLogoImg','mobileBrandLogoWrap']].forEach(([imgId, wrapId]) => {
    const img = document.getElementById(imgId), wrap = document.getElementById(wrapId);
    if (!img || !wrap) return;
    const show = () => wrap.classList.add('fallback');

    if (img.complete && img.naturalWidth === 0) show();

}
function bindCreditVisibility(prefix) {
  const payment = document.getElementById(`${prefix}-paymentMethod`);
  const creditConfig = document.getElementById(`${prefix}-credit-options`);
  const creditOption = document.getElementById(`${prefix}-creditOption`);
  const installmentsWrap = document.getElementById(`${prefix}-installments-wrap`);
  const installments = document.getElementById(`${prefix}-installments`);
  if (!payment || !creditConfig || !creditOption || !installmentsWrap || !installments) return;
  const toggle = () => {
    const isCredit = payment.value === 'credito';
    creditConfig.style.display = isCredit ? 'grid' : 'none';
    const isParcelado = isCredit && creditOption.value === 'parcelado';
    installmentsWrap.style.display = isParcelado ? 'block' : 'none';
    installments.value = isParcelado ? Math.max(Number(installments.value || 2), 2) : 1;
  };
  payment.addEventListener('change', toggle);
  creditOption.addEventListener('change', toggle);
  toggle();
}

function mobileListCard(tx, kind) {

function commonCreditFields(prefix) { return `<div class="row" id="${prefix}-credit-options" style="display:none;"><div><label for="${prefix}-creditOption">No crédito</label><select id="${prefix}-creditOption" name="creditOption"><option value="avista">À vista</option><option value="parcelado">Parcelado</option></select></div><div id="${prefix}-installments-wrap" style="display:none;"><label for="${prefix}-installments">Parcelas</label><input id="${prefix}-installments" name="installments" type="number" min="2" max="36" value="2" /></div></div>`; }

function handleSubmit(event, kind) {
  event.preventDefault();
  const form = event.target;
  const data = new FormData(form);
  const paymentMethod = data.get('paymentMethod');
  const creditOption = String(data.get('creditOption') || 'avista');
  let installments = Number(data.get('installments') || 1);
  if (paymentMethod !== 'credito') installments = 1;
  else if (creditOption !== 'parcelado') installments = 1;
  else installments = Math.max(2, installments);
  const tx = { id: uid(), kind, date: data.get('date'), amount: Number(data.get('amount')), patient: String(data.get('patient') || '').trim(), procedure: String(data.get('procedure') || '').trim(), description: String(data.get('description') || '').trim(), paymentMethod, creditOption, installments };
  if (tx.amount <= 0) return alert('Informe um valor maior que zero.');
  if (kind === 'receipt' && !tx.patient) return alert('Informe o paciente.');
  if (kind === 'receipt' && !tx.procedure) return alert('Informe o procedimento realizado.');
  if (kind === 'expense' && !tx.description) return alert('Informe a descrição da despesa.');
  state.transactions.push(tx);
  save();
  form.reset();
  const dateInput = form.querySelector('input[name="date"]'); if (dateInput) dateInput.value = todayISO();
  const paymentInput = form.querySelector('select[name="paymentMethod"]'); if (paymentInput) paymentInput.value = 'debito';
  const installmentsInput = form.querySelector('input[name="installments"]'); if (installmentsInput) installmentsInput.value = 2;
  const creditOptionInput = form.querySelector('select[name="creditOption"]'); if (creditOptionInput) creditOptionInput.value = 'avista';
  renderSections();
  alert(kind === 'receipt' ? 'Entrada salva com sucesso!' : 'Saída salva com sucesso!');
}

function applyReportFilters(schedule) {
  return schedule.filter(item => {
    const startOk = !state.reportFilters.startDate || item.effectiveDate >= state.reportFilters.startDate;
    const endOk = !state.reportFilters.endDate || item.effectiveDate <= state.reportFilters.endDate;
    const kindOk = state.reportFilters.kind === 'all' || item.kind === state.reportFilters.kind;
    const paymentOk = state.reportFilters.paymentMethod === 'all' || item.paymentMethod === state.reportFilters.paymentMethod;
    const searchOk = matchesSearch([item.patient, item.procedure, item.description, item.effectiveDate, item.creditInfo, capitalizePayment(item.paymentMethod)], state.reportFilters.search);
    return startOk && endOk && kindOk && paymentOk && searchOk;
  });
}
function exportReportCsv() {
  const rows = applyReportFilters(getAllSchedule());
  const headers = ['data_efetiva','tipo','paciente','procedimento_ou_descricao','comentarios','forma_pagamento','parcela','valor'];
  const lines = [headers.join(';')];
  rows.forEach(item => {
    const principal = item.kind === 'receipt' ? (item.procedure || '') : (item.description || '');
    const comentarios = item.kind === 'receipt' ? (item.description || '') : (item.procedure || '');
    lines.push([item.effectiveDate, item.kind === 'receipt' ? 'entrada' : 'saida', `"${String(item.patient || '').replaceAll('"','""')}"`, `"${String(principal).replaceAll('"','""')}"`, `"${String(comentarios).replaceAll('"','""')}"`, capitalizePayment(item.paymentMethod), item.paymentMethod === 'credito' ? item.creditInfo : 'À vista', String(item.amount).replace('.', ',')].join(';'));
  });
  const blob = new Blob(["\ufeff" + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = 'relatorio_caixa_clinica.csv';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}
function buildReports() {
  const el = document.getElementById('reports');
  const schedule = applyReportFilters(getAllSchedule());
  const entries = schedule.filter(i => i.kind === 'receipt').reduce((s,i) => s + i.amount, 0);
  const exits = schedule.filter(i => i.kind === 'expense').reduce((s,i) => s + i.amount, 0);
  const balance = entries - exits;
  el.innerHTML = `<div class="card wallet-card"><div class="toolbar"><div><label for="report-startDate">Início</label><input id="report-startDate" type="date" value="${state.reportFilters.startDate || ''}" /></div><div><label for="report-endDate">Fim</label><input id="report-endDate" type="date" value="${state.reportFilters.endDate || ''}" /></div><div><label for="report-kind">Tipo</label><select id="report-kind"><option value="all" ${state.reportFilters.kind==='all'?'selected':''}>Todos</option><option value="receipt" ${state.reportFilters.kind==='receipt'?'selected':''}>Entradas</option><option value="expense" ${state.reportFilters.kind==='expense'?'selected':''}>Saídas</option></select></div><div><label for="report-paymentMethod">Forma</label><select id="report-paymentMethod"><option value="all" ${state.reportFilters.paymentMethod==='all'?'selected':''}>Todas</option><option value="dinheiro" ${state.reportFilters.paymentMethod==='dinheiro'?'selected':''}>Dinheiro</option><option value="pix" ${state.reportFilters.paymentMethod==='pix'?'selected':''}>Pix</option><option value="debito" ${state.reportFilters.paymentMethod==='debito'?'selected':''}>Débito</option><option value="credito" ${state.reportFilters.paymentMethod==='credito'?'selected':''}>Crédito</option></select></div><div><label for="report-search">Buscar</label><input id="report-search" type="text" value="${state.reportFilters.search || ''}" placeholder="Paciente, procedimento, descrição" /></div><div><button type="button" id="report-export" class="btn-success" style="margin-top:24px;width:100%;">Exportar CSV</button></div></div><div class="summary"><div class="item">Entradas: ${formatCurrency(entries)}</div><div class="item">Saídas: ${formatCurrency(exits)}</div><div class="item">Saldo: ${formatCurrency(balance)}</div><div class="item">Itens: ${schedule.length}</div></div>${schedule.length ? `<div class="table-wrap" style="margin-top:14px;"><table><thead><tr><th>Data efetiva</th><th>Tipo</th><th>Paciente</th><th>Procedimento / Descrição</th><th>Forma</th><th>Parcela</th><th>Valor</th><th>Comentários</th></tr></thead><tbody>${schedule.map(item => `<tr><td>${formatDateBR(item.effectiveDate)}</td><td>${item.kind==='receipt'?'<span class="pill success">Entrada</span>':'<span class="pill danger">Saída</span>'}</td><td>${item.patient||'-'}</td><td>${item.kind==='receipt'?(item.procedure||'-'):(item.description||'-')}</td><td>${capitalizePayment(item.paymentMethod)}</td><td>${item.paymentMethod==='credito'?item.creditInfo:'À vista'}</td><td class="right"><strong>${formatCurrency(item.amount)}</strong></td><td class="small muted">${item.kind==='receipt'?(item.description||'-'):(item.procedure||'-')}</td></tr>`).join('')}</tbody></table></div><div class="mobile-stacked-list" style="margin-top:14px;"><div class="mobile-list">${schedule.map(item => mobileReportCard(item)).join('')}</div></div>` : '<div class="empty" style="margin-top:14px;">Nenhum lançamento encontrado para os filtros selecionados.</div>'}</div>`;
  ['startDate','endDate','kind','paymentMethod','search'].forEach(field => {
    const input = document.getElementById(`report-${field}`);
    if (input) input.addEventListener(field === 'search' ? 'input' : 'change', e => { state.reportFilters[field] = e.target.value; save(); buildReports(); });
  });
  document.getElementById('report-export').addEventListener('click', exportReportCsv);
}

function bindDeleteButtons() {
  document.querySelectorAll('[data-delete]').forEach(btn => btn.addEventListener('click', () => {
    const id = btn.dataset.delete;
    if (!confirm('Deseja realmente excluir este lançamento?')) return;
    state.transactions = state.transactions.filter(tx => tx.id !== id);
    save();
    renderSections();
  }));
}
function bindProductivityButtons() {
  const restoreInput = document.getElementById('restoreFileInput');
  const restoreClick = () => restoreInput.click();
  document.getElementById('backupBtn')?.addEventListener('click', downloadBackup);
  document.getElementById('restoreBtn')?.addEventListener('click', restoreClick);
  document.getElementById('exportDataBtn')?.addEventListener('click', exportAllTransactionsCsv);
  document.getElementById('clearDataBtn')?.addEventListener('click', clearAllData);
  document.getElementById('mobileBackupAction')?.addEventListener('click', downloadBackup);
  document.getElementById('mobileRestoreAction')?.addEventListener('click', restoreClick);
  document.getElementById('mobileExportAction')?.addEventListener('click', exportAllTransactionsCsv);
  document.getElementById('mobileClearAction')?.addEventListener('click', clearAllData);
  restoreInput?.addEventListener('change', e => {
    const file = e.target.files && e.target.files[0];
    if (file) restoreBackupFromFile(file);
    e.target.value = '';
  });
}
function renderSections() {
  buildDashboard();
  buildReceipts();
  buildExpenses();
  buildReports();
  bindDeleteButtons();
  document.querySelectorAll('.page').forEach(section => section.classList.toggle('active', section.id === state.activeTab));
}
function init() {
  load();
  renderMenus();
  bindLogoFallback();
  renderSections();
  setPageHeader();
  bindProductivityButtons();
}
init();
  </script>
</body>
